let activeCat="전체",openSet=new Set(),currentUtterance=null,playingWord=null,playingEx=null,voices=[],selectedVoice=null;

function loadVoices(){
  const all=speechSynthesis.getVoices();
  voices=all.filter(v=>v.lang.startsWith("en"));
  const sel=document.getElementById("voiceSelect");
  sel.innerHTML="";
  voices.forEach((v,i)=>{
    const opt=document.createElement("option");
    opt.value=i;
    opt.textContent=v.name+" ("+v.lang+")";
    sel.appendChild(opt);
  });
  const auIdx=voices.findIndex(v=>v.name.includes("Karen")||v.name.includes("AU")||v.lang==="en-AU");
  const defaultIdx=auIdx>=0?auIdx:0;
  sel.value=defaultIdx;
  selectedVoice=voices[defaultIdx]||null;
  sel.onchange=()=>{selectedVoice=voices[parseInt(sel.value)]||null;};
}

function speak(text,id,isEx){
  if(currentUtterance){
    speechSynthesis.cancel();
    if((isEx&&playingEx===id)||(!isEx&&playingWord===id)){
      currentUtterance=null;playingWord=null;playingEx=null;
      render(document.getElementById("search").value);return;
    }
  }
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-AU";u.rate=0.88;u.pitch=1;u.volume=1;
  if(selectedVoice)u.voice=selectedVoice;
  u.onend=()=>{currentUtterance=null;playingWord=null;playingEx=null;render(document.getElementById("search").value);};
  currentUtterance=u;
  if(isEx){playingEx=id;playingWord=null;}else{playingWord=id;playingEx=null;}
  speechSynthesis.speak(u);
  render(document.getElementById("search").value);
}

function render(q){
  const lower=q.toLowerCase();
  const filtered=data.filter(d=>{
    const catOk=activeCat==="전체"||(d.c===activeCat);
    const searchOk=!lower||d.w.includes(lower)||d.m.includes(lower);
    return catOk&&searchOk;
  });
  document.getElementById("cnt").textContent=filtered.length+"개";
  const list=document.getElementById("list");
  if(!filtered.length){list.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}
  list.innerHTML=filtered.map(d=>{
    const open=openSet.has(d.w);
    const wPlay=playingWord===d.w;
    const ePlay=playingEx===d.w+"-ex";
    return`<div class="card${open?" open":""}">
      <div class="card-top" onclick="toggleCard('${d.w.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">
        <span class="word">${d.w}</span>
        <span class="meaning">${d.m}</span>
        <span class="speak-btn${wPlay?" playing":""}" onclick="event.stopPropagation();speak('${d.w.replace(/'/g,"\\'")}','${d.w.replace(/'/g,"\\'")}',false)">${wPlay?"■":"▶"}</span>
        <span class="arrow">&#8964;</span>
      </div>
      ${open?`<div class="detail">
        <div class="ex-wrap">
          <span class="ex-speak${ePlay?" playing":""}" onclick="speak('${d.e.replace(/'/g,"\\'")}','${(d.w+"-ex").replace(/'/g,"\\'")}',true)">${ePlay?"■":"▶"}</span>
          <div class="ex-text">
            <div class="ex-en">${d.e}</div>
            <div class="ex-kr">${d.k}</div>
          </div>
        </div>
      </div>`:""}
    </div>`;
  }).join("");
}

function toggleCard(w){if(openSet.has(w))openSet.delete(w);else openSet.add(w);render(document.getElementById("search").value);}
function buildCats(){
  document.getElementById("cats").innerHTML=allCats.map(c=>
    `<button class="cat-btn${c===activeCat?" active":""}" onclick="setcat('${c}')">${c}<span class="badge">${getCatCount(c)}</span></button>`
  ).join("");
}
function setcat(c){activeCat=c;buildCats();render(document.getElementById("search").value);}
document.getElementById("search").addEventListener("input",e=>render(e.target.value));
speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();buildCats();render("");
</script>
</body>
</html>
