<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS reading voca</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;-webkit-text-size-adjust:100%}
.top{background:#fff;padding:14px 16px;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:10;display:flex;flex-direction:column;gap:10px}
.top-row{display:flex;align-items:center;gap:8px}
.title{font-size:17px;font-weight:600;flex:1}
.cnt{font-size:12px;color:#888;background:#f0f0f0;padding:3px 10px;border-radius:999px;white-space:nowrap}
.search-wrap input{width:100%;padding:10px 14px;font-size:15px;border:1px solid #ddd;border-radius:10px;background:#fafafa;color:#1a1a1a;outline:none}
.search-wrap input:focus{border-color:#4a90e2;background:#fff}
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;white-space:nowrap;min-height:34px;display:flex;align-items:center;gap:4px}
.cat-btn.active{background:#4a90e2;color:#fff;border-color:#4a90e2;font-weight:600}
.cat-btn .badge{font-size:11px;padding:1px 5px;border-radius:999px;background:rgba(0,0,0,0.1)}
.cat-btn.active .badge{background:rgba(255,255,255,0.3)}
.list{padding:12px 16px;display:flex;flex-direction:column;gap:8px;max-width:720px;margin:0 auto;width:100%}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.card:hover{border-color:#bbb;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card.open{border-color:#4a90e2}
.card.highlight{border-color:#34c759;background:#f0fff4}
.card-top{display:flex;align-items:center;gap:10px}
.word{font-size:17px;font-weight:600;color:#1a1a1a}
.meaning{font-size:14px;color:#666;flex:1}
.arrow{font-size:13px;color:#bbb;transition:transform 0.2s;margin-left:auto}
.card.open .arrow{transform:rotate(180deg)}
.detail{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;display:flex;flex-direction:column;gap:10px}
.syn-row{display:flex;flex-wrap:wrap;gap:6px}
.syn{font-size:12px;padding:4px 10px;border-radius:999px;background:#f0f0f0;color:#555;border:1px solid #e0e0e0;cursor:default}
.syn.linked{color:#4a90e2;border-color:#b3d4f5;background:#eef5ff;cursor:pointer;font-weight:600}
.syn.linked:active{background:#d0e8ff}
.ex-en{font-size:13px;color:#333;line-height:1.65;border-left:3px solid #4a90e2;padding-left:10px}
.ex-kr{font-size:12px;color:#888;line-height:1.65;padding-left:13px;font-style:italic}
.empty{padding:3rem 1rem;text-align:center;font-size:14px;color:#999}
.footer{text-align:center;padding:2rem 1rem;font-size:12px;color:#bbb}
</style>
</head>
<body>

<div class="top">
  <div class="top-row">
    <span class="title">IELTS 핵심 단어장</span>
    <span class="cnt" id="cnt">157개</span>
  </div>
  <div class="search-wrap">
    <input type="text" placeholder="단어 또는 뜻 검색..." id="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
  </div>
  <div class="cats" id="cats"></div>
</div>
<div class="list" id="list"></div>
<div class="footer">IELTS Reading 핵심 단어장 · 157개</div>

  {w:"interpret",m:"해석하다",s:["analyse","examine","distinguish"],e:"Scientists interpret data from satellite images.",k:"과학자들은 위성 이미지의 데이터를 해석한다."},

  {w:"consider",m:"고려하다",s:["evaluate","acknowledge","reflect"],e:"We must consider the long-term consequences.",k:"우리는 장기적인 결과를 고려해야 한다."},

  {w:"decrease",m:"감소하다",s:["decline","reduce","shift"],e:"Carbon emissions decreased after the new law.",k:"새 법 시행 후 탄소 배출량이 감소했다."},

  {w:"develop",m:"발전하다",s:["evolve","expand","improve"],e:"Countries develop economically through trade.",k:"국가들은 무역을 통해 경제적으로 발전한다."},

  "however":"구조·논리","therefore":"구조·논리","furthermore":"구조·논리","consequently":"구조·논리","alternatively":"구조·논리","notably":"구조·논리","primarily":"구조·논리","largely":"구조·논리",
};

const allCats=["전체","사고·판단","변화·과정","행동·사건","사회·역사","원인·결과","시간·순서","연결·관계","학문·연구","환경·자연","경제·사회","핵심표현","묘사·설명","구조·논리"];
const wordSet=new Set(data.map(d=>d.w));

function getCatCount(cat){
  if(cat==="전체") return data.length;
  return data.filter(d=>catMap[d.w]===cat).length;
}

let activeCat="전체";
let openSet=new Set();
let highlightWord=null;

function goTo(w){
  activeCat="전체";
  buildCats();
  document.getElementById("search").value="";
  openSet.clear();
  openSet.add(w);
  highlightWord=w;
  render("");
  setTimeout(()=>{
    const id="card-"+w.replace(/ /g,"-");
    const el=document.getElementById(id);
    if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
    setTimeout(()=>{highlightWord=null;render(document.getElementById("search").value);},1200);
  },80);
}

function render(q){
  const lower=q.toLowerCase();
  const filtered=data.filter(d=>{
    const catOk=activeCat==="전체"||(catMap[d.w]===activeCat);
    const searchOk=!lower||d.w.includes(lower)||d.m.includes(lower)||d.s.some(s=>s.includes(lower));
    return catOk&&searchOk;
  });
  document.getElementById("cnt").textContent=filtered.length+"개";
  const list=document.getElementById("list");
  if(!filtered.length){list.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}
  list.innerHTML=filtered.map(d=>{
    const open=openSet.has(d.w);
    const hl=highlightWord===d.w;
    const id="card-"+d.w.replace(/ /g,"-");
    return`<div class="card${open?" open":""}${hl?" highlight":""}" id="${id}" onclick="toggleCard('${d.w.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">
      <div class="card-top">
        <span class="word">${d.w}</span>
        <span class="meaning">${d.m}</span>
        <span class="arrow">&#8964;</span>
      </div>
      ${open?`<div class="detail">
        <div class="syn-row">${d.s.map(s=>{
          const linked=wordSet.has(s);
          return`<span class="syn${linked?" linked":""}"${linked?` onclick="event.stopPropagation();goTo('${s.replace(/'/g,"\\'")}')"`:""}>${s}</span>`;
        }).join("")}</div>
        <div class="ex-en">${d.e}</div>
        <div class="ex-kr">${d.k}</div>
      </div>`:""}
    </div>`;
  }).join("");
}

function toggleCard(w){
  if(openSet.has(w))openSet.delete(w);else openSet.add(w);
  render(document.getElementById("search").value);
}

function buildCats(){
  document.getElementById("cats").innerHTML=allCats.map(c=>
    `<button class="cat-btn${c===activeCat?" active":""}" onclick="setcat('${c}')">
      ${c}<span class="badge">${getCatCount(c)}</span>
    </button>`
  ).join("");
}

function setcat(c){activeCat=c;buildCats();render(document.getElementById("search").value);}
document.getElementById("search").addEventListener("input",e=>render(e.target.value));
buildCats();render("");
</script>
</body>
</html>
